[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/cron/*"
  to = "/.netlify/functions/cron-reminders"
  status = 200

[[redirects]]
  from = "/api/send-email"
  to = "/.netlify/functions/send-email"
  status = 200

[[redirects]]
  from = "/api/v1/participantes/*"
  to = "/.netlify/functions/participantes"
  status = 200

[[redirects]]
  from = "/api/webhook/prestamos"
  to = "/.netlify/functions/webhook-prestamos"
  status = 200

[[redirects]]
  from = "/api/files/*"
  to = "/.netlify/functions/files"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
