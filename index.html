<!DOCTYPE html>

  <head>
    <script>
      // Saneamiento inmediato de localStorage e interceptor de JSON.parse para evitar bloqueos por iframe/preview
      (function() {
        try {
          // Limpiar claves corruptas existentes
          for (var i = 0; i < localStorage.length; i++) {
            var key = localStorage.key(i);
            if (key) {
              var val = localStorage.getItem(key);
              if (val === 'undefined' || val === 'null' || val === '[object Object]') {
                localStorage.removeItem(key);
                i--;
              }
            }
          }
          
          // Interceptador de localStorage.getItem
          var originalGetItem = localStorage.getItem;
          localStorage.getItem = function(key) {
            var val = originalGetItem.call(localStorage, key);
            if (val === 'undefined' || val === 'null') {
              try { localStorage.removeItem(key); } catch(e){}
              return null;
            }
            return val;
          };

          // Interceptador de JSON.parse ultra-seguro
          var originalParse = JSON.parse;
          JSON.parse = function(text, reviver) {
            if (text === undefined || text === 'undefined') {
              console.warn("JSON.parse interceptado para evitar error con 'undefined'");
              return undefined;
            }
            if (text === null || text === 'null') {
              return null;
            }
            try {
              return originalParse.call(JSON, text, reviver);
            } catch (err) {
              // Si falla y el texto contiene "undefined", intentar sanearlo o retornar un objeto vacío/fallback
              if (typeof text === 'string' && text.indexOf('undefined') !== -1) {
                console.warn("Error de parseo debido a 'undefined' incrustado, retornando fallback:", err);
                return {};
              }
              throw err;
            }
          };
        } catch (e) {
          console.warn("No se pudo inicializar saneamiento preventivo:", e);
        }
      })();
    </script>
